<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 222A | Digital Claims Office</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #4ade80; }
        .terminal-container { border: 2px solid #14532d; box-shadow: 0 0 25px rgba(20, 83, 45, 0.4); }
        .glow { text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
        
        /* SCANLINE EFFECT */
        .crt-line {
            pointer-events: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px; z-index: 100;
        }

        /* PRINT LOGIC: This ensures a clean white page with black text */
        @media print {
            .no-print, header, nav, #setup-screen, #main-screen, .crt-line, button, footer {
                display: none !important;
            }
            body, .terminal-container {
                background: white !important;
                color: black !important;
                border: none !important;
                box-shadow: none !important;
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            #result-screen {
                display: block !important;
                width: 100% !important;
            }
            #report-text {
                background: white !important;
                color: black !important;
                border: 2px solid black !important;
                padding: 30px !important;
                font-family: "Courier New", Courier, monospace !important;
                font-size: 12pt !important;
                white-space: pre-wrap !important;
                box-shadow: none !important;
            }
            h2 { color: black !important; border-bottom: 2px solid black !important; }
            .glow { text-shadow: none !important; }
        }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen flex items-center justify-center">
    <div class="crt-line no-print"></div>

    <div class="max-w-4xl w-full terminal-container p-6 md:p-10 bg-black rounded-2xl relative overflow-hidden">
        
        <!-- HEADER -->
        <header class="border-b-2 border-green-900 pb-6 mb-8 flex justify-between items-center no-print">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter glow">Airport Lost & Found</h1>
                <p class="text-[10px] text-green-800 font-bold uppercase tracking-widest mt-1">Class 222A | Computer Lab | April 17</p>
            </div>
            <i class="fas fa-shield-halved text-4xl text-green-900"></i>
        </header>

        <!-- STEP 1: LOGIN -->
        <div id="setup-screen" class="space-y-8 no-print">
            <div class="bg-green-950/10 p-8 border border-green-900 rounded-xl">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-3 uppercase">
                    <span class="bg-green-900 text-black w-8 h-8 rounded-full flex items-center justify-center text-sm font-black">1</span>
                    Identify Officer
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-[10px] font-black text-green-800 uppercase mb-2">Select Your Name</label>
                        <select id="student-name" class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-lg text-lg outline-none focus:border-green-400">
                            <option value="">-- Choose Name --</option>
                            <option value="B., Adeline">B., Adeline</option>
                            <option value="B., Rose">B., Rose</option>
                            <option value="C., Vivian">C., Vivian</option>
                            <option value="C., Debora">C., Debora</option>
                            <option value="C., Domingo">C., Domingo</option>
                            <option value="C., Paola">C., Paola</option>
                            <option value="E., Marie">E., Marie</option>
                            <option value="F., MacDonald">F., MacDonald</option>
                            <option value="H., Maria">H., Maria</option>
                            <option value="J., Jeyoung">J., Jeyoung</option>
                            <option value="K., Mijung">K., Mijung</option>
                            <option value="K., Aminata">K., Aminata</option>
                            <option value="M., Estefania">M., Estefania</option>
                            <option value="O., Priscilla">O., Priscilla</option>
                            <option value="P., Enderson">P., Enderson</option>
                            <option value="S., Frisia">S., Frisia</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-green-800 uppercase mb-2">Class Level</label>
                        <select id="student-level" class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-lg text-lg outline-none">
                            <option value="basic">NRS Level 1-2</option>
                            <option value="intermediate">NRS Level 3</option>
                            <option value="advanced">NRS Level 4-5</option>
                        </select>
                    </div>
                </div>
                <button onclick="startApp()" class="mt-10 bg-green-600 text-black px-8 py-5 font-black hover:bg-green-400 w-full rounded-xl text-xl uppercase transition-all shadow-lg">
                    Log in to Terminal
                </button>
            </div>
        </div>

        <!-- MAIN ACTIVITY -->
        <div id="main-screen" class="hidden space-y-8 no-print">
            <!-- AUDIO -->
            <div class="bg-blue-900/10 border-2 border-blue-900 p-6 rounded-2xl flex flex-col md:flex-row items-center gap-6">
                <div class="flex-1 text-center md:text-left">
                    <h3 class="text-blue-400 font-bold text-lg uppercase tracking-tight">2. Audio Evidence</h3>
                    <p class="text-xs text-blue-800 font-bold">Listen to the traveler's description.</p>
                </div>
                <button onclick="playAudio()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-black flex items-center gap-3 hover:bg-blue-500 transition-all shadow-xl">
                    <i class="fas fa-play"></i> Play Message
                </button>
                <audio id="audio-player"></audio>
            </div>

            <!-- FORM -->
            <div class="space-y-8">
                <div>
                    <label class="block text-sm font-bold mb-3 text-green-500 uppercase">3. Describe the Item</label>
                    <textarea id="item-desc" rows="4" placeholder="Type adjectives for color, material, and size..." class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-xl text-lg outline-none focus:border-green-400 placeholder:text-green-900"></textarea>
                </div>

                <div id="advanced-only" class="hidden space-y-8 border-t border-green-900 pt-8">
                    <div>
                        <label class="block text-sm font-bold mb-2 text-green-500 uppercase">4. When? (Time Clauses)</label>
                        <input type="text" id="time-clause" placeholder="Example: I will wait until..." class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2 text-green-500 uppercase">5. Reported Speech</label>
                        <input type="text" id="reported-speech" placeholder="The traveler said that he..." class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-xl outline-none">
                    </div>
                </div>

                <button onclick="submitReport()" id="submit-btn" class="w-full bg-green-600 text-black py-5 font-black hover:bg-green-400 rounded-xl text-xl uppercase transition-all active:scale-95">
                    Generate Case Report
                </button>
            </div>

            <!-- BACKUP LINKS -->
            <div class="pt-6 border-t border-green-900/30 flex justify-center gap-8 text-[10px] uppercase font-bold text-green-900">
                <a href="claim_basic.mp3" target="_blank">Basic Audio</a>
                <a href="claim_intermediate.mp3" target="_blank">Intermediate Audio</a>
                <a href="claim_advanced.mp3" target="_blank">Advanced Audio</a>
            </div>
        </div>

        <!-- RESULTS / PRINT PREVIEW -->
        <div id="result-screen" class="hidden mt-8 border-t-4 border-green-900 pt-8 animate-in slide-in-from-bottom-10 duration-700">
            <h2 class="text-2xl font-black uppercase mb-6 glow">Official Claim Report: #<span id="case-id"></span></h2>
            <div id="report-text" class="bg-black p-8 border-2 border-green-500 text-green-400 text-lg leading-relaxed whitespace-pre-wrap rounded-2xl min-h-[250px] shadow-inner font-mono"></div>
            
            <div class="mt-10 flex gap-4 no-print pb-10">
                <button onclick="window.print()" class="bg-green-500 text-black px-10 py-4 font-black hover:bg-green-300 rounded-xl flex-1 shadow-lg">
                    <i class="fas fa-print mr-2"></i> Print for Folder
                </button>
                <button onclick="location.reload()" class="border-2 border-green-900 px-10 py-4 font-black hover:bg-green-950 text-green-900 rounded-xl">
                    New Case
                </button>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="mt-12 pt-6 border-t border-green-950 text-[10px] text-green-900 flex justify-between font-bold uppercase tracking-widest no-print">
            <span>Class 222A Security Terminal</span>
            <span>Offline Support Active</span>
            <span>Harris Adult Education</span>
        </footer>
    </div>

    <script>
        const apiKey = ""; 

        function startApp() {
            const name = document.getElementById('student-name').value;
            const level = document.getElementById('student-level').value;
            if(!name) { alert("Please select your name."); return; }

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            
            if(level === 'advanced' || level === 'intermediate') {
                document.getElementById('advanced-only').classList.remove('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function playAudio() {
            const level = document.getElementById('student-level').value;
            const player = document.getElementById('audio-player');
            player.src = "claim_" + level + ".mp3";
            player.play().catch(() => alert("Audio failed. Use backup links below."));
        }

        function generateLocalReport(name, level, desc, time, report) {
            const cid = Math.floor(Math.random() * 8999) + 1000;
            
            // BUILD THE REPORT DYNAMICALLY BASED ON LEVEL
            let reportBody = `OFFICIAL SECURITY AFFIDAVIT\n`;
            reportBody += `CASE NUMBER: 222A-${cid}\n`;
            reportBody += `DATE: April 17, 2026\n`;
            reportBody += `--------------------------------------------------\n`;
            reportBody += `REPORTING OFFICER: ${name}\n`;
            reportBody += `OFFICER LEVEL: ${level.toUpperCase()}\n\n`;
            reportBody += `EVIDENCE DESCRIPTION:\n${desc}\n\n`;
            
            // ONLY SHOW STORY/REPORTED SPEECH FOR HIGHER LEVELS
            if (level === 'advanced' || level === 'intermediate') {
                if (time) {
                    reportBody += `TIMELINE / TIME CLAUSE:\n${time}\n\n`;
                }
                if (report) {
                    reportBody += `REPORTED TRAVELER STATEMENT:\n${report}\n\n`;
                }
            }
            
            reportBody += `--------------------------------------------------\n`;
            reportBody += `VERDICT: Claim filed. Please print and place in folder.\n`;
            reportBody += `OFFICIAL SIGNATURE: ______________________________`;
            
            document.getElementById('case-id').innerText = cid;
            document.getElementById('report-text').innerText = reportBody;
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerHTML = 'Generate Case Report';
            document.getElementById('result-screen').scrollIntoView({ behavior: 'smooth' });
        }

        async function submitReport() {
            const name = document.getElementById('student-name').value;
            const level = document.getElementById('student-level').value;
            const desc = document.getElementById('item-desc').value;
            const time = document.getElementById('time-clause').value;
            const report = document.getElementById('reported-speech').value;
            const btn = document.getElementById('submit-btn');

            if(!desc) { alert("Please type a description."); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processing File...';

            // GITHUB / OFFLINE BACKUP (ALWAYS WORKS)
            if (apiKey === "" && !window.location.hostname.includes('artifact')) {
                setTimeout(() => generateLocalReport(name, level, desc, time, report), 1000);
                return;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Officer: ${name}. Level: ${level}. Description: ${desc}. Time: ${time}. Speech: ${report}` }] }],
                        systemInstruction: { parts: [{ text: "Write a professional airport security report for an ESL student. No emojis. Clean text." }] }
                    })
                });
                
                if (!response.ok) throw new Error();
                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                document.getElementById('report-text').innerText = aiText;
                document.getElementById('case-id').innerText = Math.floor(Math.random() * 8999) + 1000;
                document.getElementById('result-screen').classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = 'Generate Case Report';
                document.getElementById('result-screen').scrollIntoView({ behavior: 'smooth' });

            } catch (e) {
                generateLocalReport(name, level, desc, time, report);
            }
        }

        // AUTO-LEVELING
        document.getElementById('student-name').addEventListener('change', function() {
            const val = this.value;
            const l1_2 = ["B., Adeline", "B., Rose", "F., MacDonald", "S., Frisia", "C., Paola", "H., Maria", "K., Aminata"];
            const l3 = ["C., Vivian", "C., Debora", "C., Domingo", "M., Estefania"];
            const l4_5 = ["E., Marie", "J., Jeyoung", "K., Mijung", "O., Priscilla", "P., Enderson"];
            if (l1_2.includes(val)) document.getElementById('student-level').value = "basic";
            else if (l3.includes(val)) document.getElementById('student-level').value = "intermediate";
            else if (l4_5.includes(val)) document.getElementById('student-level').value = "advanced";
        });
    </script>
</body>
</html>
