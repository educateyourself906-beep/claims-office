<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 222A | Digital Claims Office</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #4ade80; }
        .terminal-container { border: 2px solid #14532d; box-shadow: 0 0 25px rgba(20, 83, 45, 0.4); }
        .crt-line {
            pointer-events: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px; z-index: 100;
        }
        .glow { text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
        select option { background-color: #000; color: #4ade80; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen flex items-center justify-center">
    <div class="crt-line"></div>

    <div class="max-w-4xl w-full terminal-container p-6 md:p-10 bg-black rounded-2xl relative overflow-hidden">
        
        <!-- HEADER -->
        <header class="border-b-2 border-green-900 pb-6 mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter glow">Airport Lost & Found</h1>
                <p class="text-[10px] text-green-800 font-bold uppercase tracking-widest mt-1">Class 222A | Digital Lab | April 17</p>
            </div>
            <i class="fas fa-shield-halved text-4xl text-green-900"></i>
        </header>

        <!-- SETUP SECTION -->
        <div id="setup-screen" class="space-y-8">
            <div class="bg-green-950/10 p-8 border border-green-900 rounded-xl">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-3">
                    <span class="bg-green-900 text-black w-8 h-8 rounded-full flex items-center justify-center text-sm font-black">1</span>
                    IDENTIFY OFFICER
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-[10px] font-black text-green-800 uppercase mb-2">Select Your Name</label>
                        <select id="student-name" class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-lg text-lg outline-none focus:border-green-400">
                            <option value="">-- Click to choose --</option>
                            <option value="B., Adeline">B., Adeline</option>
                            <option value="B., Rose">B., Rose</option>
                            <option value="C., Vivian">C., Vivian</option>
                            <option value="C., Debora">C., Debora</option>
                            <option value="C., Domingo">C., Domingo</option>
                            <option value="C., Paola">C., Paola</option>
                            <option value="E., Marie">E., Marie</option>
                            <option value="F., MacDonald">F., MacDonald</option>
                            <option value="H., Maria">H., Maria</option>
                            <option value="J., Jeyoung">J., Jeyoung</option>
                            <option value="K., Mijung">K., Mijung</option>
                            <option value="K., Aminata">K., Aminata</option>
                            <option value="M., Estefania">M., Estefania</option>
                            <option value="O., Priscilla">O., Priscilla</option>
                            <option value="P., Enderson">P., Enderson</option>
                            <option value="S., Frisia">S., Frisia</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-green-800 uppercase mb-2">Level</label>
                        <select id="student-level" class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-lg text-lg outline-none">
                            <option value="basic">NRS Level 1-2</option>
                            <option value="intermediate">NRS Level 3</option>
                            <option value="advanced">NRS Level 4-5</option>
                        </select>
                    </div>
                </div>
                <button onclick="startApp()" class="mt-10 bg-green-600 text-black px-8 py-5 font-black hover:bg-green-400 w-full rounded-xl text-xl uppercase transition-all shadow-lg">
                    LOG IN TO TERMINAL
                </button>
            </div>
        </div>

        <!-- MAIN ACTIVITY SECTION -->
        <div id="main-screen" class="hidden space-y-8 animate-in fade-in duration-500">
            <!-- AUDIO PANEL -->
            <div class="bg-blue-900/10 border-2 border-blue-900 p-6 rounded-2xl flex flex-col md:flex-row items-center gap-6">
                <div class="flex-1">
                    <h3 class="text-blue-400 font-bold text-lg uppercase tracking-tight">Step 2: Audio Evidence</h3>
                    <p class="text-xs text-blue-800 font-bold">Listen to the traveler's voice before typing.</p>
                </div>
                <button onclick="playAudio()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-black flex items-center gap-3 hover:bg-blue-500 transition-all shadow-xl">
                    <i class="fas fa-play"></i> PLAY CLIP
                </button>
                <audio id="audio-player"></audio>
            </div>

            <!-- FORM -->
            <div class="space-y-8">
                <div>
                    <label class="block text-sm font-bold mb-3 text-green-500 uppercase">3. Describe the Item</label>
                    <textarea id="item-desc" rows="5" placeholder="What color? What material? What size?" class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-xl text-lg outline-none focus:border-green-400 placeholder:text-green-900"></textarea>
                </div>

                <div id="advanced-only" class="hidden space-y-8 border-t border-green-900 pt-8">
                    <div>
                        <label class="block text-sm font-bold mb-2 text-green-500">4. Time Clause (until / as soon as)</label>
                        <input type="text" id="time-clause" placeholder="I will wait until..." class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2 text-green-500">5. Reported Speech</label>
                        <input type="text" id="reported-speech" placeholder="The traveler said that he..." class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-xl outline-none">
                    </div>
                </div>

                <button onclick="submitReport()" id="submit-btn" class="w-full bg-green-600 text-black py-5 font-black hover:bg-green-400 rounded-xl text-xl uppercase shadow-2xl transition-all">
                    GENERATE OFFICIAL REPORT
                </button>
            </div>

            <!-- BACKUP AUDIO LINKS -->
            <div class="pt-10 border-t border-green-900/30 flex justify-center gap-8 text-[10px] uppercase font-bold text-green-900">
                <a href="claim_basic.mp3" target="_blank" class="hover:text-green-400 transition-colors">Basic Link</a>
                <a href="claim_intermediate.mp3" target="_blank" class="hover:text-green-400 transition-colors">Intermediate Link</a>
                <a href="claim_advanced.mp3" target="_blank" class="hover:text-green-400 transition-colors">Advanced Link</a>
            </div>
        </div>

        <!-- RESULTS SECTION -->
        <div id="result-screen" class="hidden mt-8 border-t-4 border-green-900 pt-8 animate-in slide-in-from-bottom-10 duration-700">
            <h2 class="text-2xl font-black uppercase mb-6 glow">Case Report: #<span id="case-id"></span></h2>
            <div id="report-text" class="bg-black p-8 border-2 border-green-500 text-green-400 text-lg leading-relaxed whitespace-pre-wrap rounded-2xl min-h-[250px] shadow-inner font-mono"></div>
            <div class="mt-10 flex gap-4 no-print">
                <button onclick="window.print()" class="bg-green-500 text-black px-10 py-4 font-black hover:bg-green-300 rounded-xl flex-1 shadow-lg">PRINT FOR FOLDER</button>
                <button onclick="location.reload()" class="border-2 border-green-900 px-10 py-4 font-black hover:bg-green-950 text-green-900 rounded-xl">NEW REPORT</button>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="mt-12 pt-6 border-t border-green-950 text-[10px] text-green-900 flex justify-between font-bold uppercase tracking-widest">
            <span>SECURE SYSTEM ACTIVE</span>
            <span>HARRIS ADULT EDUCATION</span>
        </footer>
    </div>

    <script>
        const apiKey = ""; // Left empty - environment handles key only in Canvas

        function startApp() {
            const name = document.getElementById('student-name').value;
            const level = document.getElementById('student-level').value;
            if(!name) { alert("Please select your name."); return; }

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            
            if(level === 'advanced' || level === 'intermediate') {
                document.getElementById('advanced-only').classList.remove('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function playAudio() {
            const level = document.getElementById('student-level').value;
            const player = document.getElementById('audio-player');
            player.src = "claim_" + level + ".mp3";
            player.play().catch(() => {
                alert("Audio connection failed. Use the links at the bottom of the screen.");
            });
        }

        function generateLocalReport(name, level, desc, time, report) {
            const cid = Math.floor(Math.random() * 89999) + 10000;
            const text = `SECURITY AFFIDAVIT - CASE #${cid}\n` +
                         `--------------------------------------\n` +
                         `REPORTING OFFICER: ${name}\n` +
                         `LEVEL ASSIGNMENT: ${level.toUpperCase()}\n\n` +
                         `ITEM DESCRIPTION:\n${desc}\n\n` +
                         `TIMELINE LOG:\n${time || "N/A"}\n\n` +
                         `OFFICIAL STATEMENT:\n${report || "N/A"}\n\n` +
                         `STATUS: DOCUMENT FILED SECURELY.\n` +
                         `PLEASE PRINT THIS COPY FOR YOUR WORK FOLDER.`;
            
            document.getElementById('case-id').innerText = cid;
            document.getElementById('report-text').innerText = text;
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerHTML = 'GENERATE OFFICIAL REPORT';
            document.getElementById('result-screen').scrollIntoView({ behavior: 'smooth' });
        }

        async function submitReport() {
            const name = document.getElementById('student-name').value;
            const level = document.getElementById('student-level').value;
            const desc = document.getElementById('item-desc').value;
            const time = document.getElementById('time-clause').value;
            const report = document.getElementById('reported-speech').value;
            const btn = document.getElementById('submit-btn');

            if(!desc) { alert("Please type the description."); return; }

            btn.disabled = true;
            btn.innerHTML = 'PROCESSING DATA...';

            // FALLBACK: If not in Canvas (like GitHub), use Local Generator immediately
            if (apiKey === "" && !window.location.hostname.includes('artifact')) {
                setTimeout(() => generateLocalReport(name, level, desc, time, report), 1000);
                return;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Officer: ${name}. Level: ${level}. Description: ${desc}. Time: ${time}. Speech: ${report}` }] }],
                        systemInstruction: { parts: [{ text: "Rewrite this as a formal, professional security report. Clean up any grammar errors from the student." }] }
                    })
                });
                
                if (!response.ok) throw new Error();
                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                document.getElementById('report-text').innerText = aiText;
                document.getElementById('case-id').innerText = Math.floor(Math.random() * 8999) + 1000;
                document.getElementById('result-screen').classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = 'GENERATE OFFICIAL REPORT';
                document.getElementById('result-screen').scrollIntoView({ behavior: 'smooth' });

            } catch (e) {
                // If server fails or key is missing, use Local Generator
                generateLocalReport(name, level, desc, time, report);
            }
        }

        // AUTO-LEVELING LOGIC
        document.getElementById('student-name').addEventListener('change', function() {
            const val = this.value;
            const levelSelect = document.getElementById('student-level');
            const l1_2 = ["B., Adeline", "B., Rose", "F., MacDonald", "S., Frisia", "C., Paola", "H., Maria", "K., Aminata"];
            const l3 = ["C., Vivian", "C., Debora", "C., Domingo", "M., Estefania"];
            const l4_5 = ["E., Marie", "J., Jeyoung", "K., Mijung", "O., Priscilla", "P., Enderson"];
            if (l1_2.includes(val)) levelSelect.value = "basic";
            else if (l3.includes(val)) levelSelect.value = "intermediate";
            else if (l4_5.includes(val)) levelSelect.value = "advanced";
        });
    </script>
</body>
</html>
