<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 222A | Digital Claims Office</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #4ade80; }
        .terminal-border { border: 2px solid #14532d; box-shadow: 0 0 20px rgba(20, 83, 45, 0.4); }
        .glow-text { text-shadow: 0 0 8px rgba(74, 222, 128, 0.5); }
        .crt-overlay {
            pointer-events: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px; z-index: 100;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="crt-overlay"></div>

    <div class="max-w-4xl mx-auto terminal-border p-6 md:p-8 bg-black rounded-lg relative overflow-hidden">
        
        <!-- HEADER -->
        <header class="border-b-2 border-green-900 pb-6 mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tight glow-text">Airport Lost & Found</h1>
                <p class="text-[10px] text-green-800 font-bold uppercase mt-1">Class 222A | Computer Lab Activity</p>
            </div>
            <i class="fas fa-headset text-3xl text-green-900 mb-1"></i>
        </header>

        <!-- STEP 1: SETUP -->
        <div id="setup-screen" class="space-y-8">
            <div class="bg-green-950/10 p-8 border border-green-900 rounded-xl">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-3">
                    <span class="bg-green-900 text-black w-8 h-8 rounded-full flex items-center justify-center text-sm font-black">1</span>
                    SELECT YOUR IDENTITY
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <select id="student-name" class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-lg text-lg outline-none focus:border-green-400">
                        <option value="">-- Find Your Name --</option>
                        <option value="B., Adeline">B., Adeline</option>
                        <option value="B., Rose">B., Rose</option>
                        <option value="C., Vivian">C., Vivian</option>
                        <option value="C., Debora">C., Debora</option>
                        <option value="C., Domingo">C., Domingo</option>
                        <option value="C., Paola">C., Paola</option>
                        <option value="E., Marie">E., Marie</option>
                        <option value="F., MacDonald">F., MacDonald</option>
                        <option value="H., Maria">H., Maria</option>
                        <option value="J., Jeyoung">J., Jeyoung</option>
                        <option value="K., Mijung">K., Mijung</option>
                        <option value="K., Aminata">K., Aminata</option>
                        <option value="M., Estefania">M., Estefania</option>
                        <option value="O., Priscilla">O., Priscilla</option>
                        <option value="P., Enderson">P., Enderson</option>
                        <option value="S., Frisia">S., Frisia</option>
                    </select>
                    <select id="student-level" class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-lg text-lg outline-none">
                        <option value="basic">Level 1 or 2</option>
                        <option value="intermediate">Level 3</option>
                        <option value="advanced">Level 4 or 5</option>
                    </select>
                </div>
                <button onclick="startClaim()" class="mt-8 bg-green-600 text-black px-8 py-5 font-black hover:bg-green-400 w-full rounded-lg text-xl uppercase tracking-tighter transition-all">
                    START ASSIGNMENT
                </button>
            </div>
        </div>

        <!-- STEP 2: ACTIVITY -->
        <div id="claim-screen" class="hidden space-y-8">
            <!-- AUDIO PLAYER -->
            <div class="bg-blue-900/10 border-2 border-blue-900 p-6 rounded-xl flex flex-col md:flex-row items-center gap-6">
                <div class="flex-1">
                    <h3 class="text-blue-400 font-black text-lg uppercase">Step 2: Listen</h3>
                    <p class="text-xs text-blue-800">Click the button to hear the traveler's voice.</p>
                </div>
                <button onclick="playTargetAudio()" class="bg-blue-600 text-white px-8 py-4 rounded-full font-black flex items-center gap-3 hover:bg-blue-400 shadow-lg transition-all">
                    <i class="fas fa-play-circle text-2xl"></i> PLAY AUDIO
                </button>
                <audio id="audio-player"></audio>
            </div>

            <!-- WRITING AREA -->
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold mb-2 text-green-600 uppercase">3. Describe what you heard</label>
                    <textarea id="item-desc" rows="5" placeholder="Type the colors, materials, and sizes..." class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-lg text-lg outline-none focus:border-green-400"></textarea>
                </div>
                <div id="advanced-fields" class="hidden space-y-6">
                    <input type="text" id="time-clause" placeholder="Use 'until' or 'as soon as'..." class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-lg">
                    <input type="text" id="reported-speech" placeholder="The traveler said that..." class="w-full bg-black border-2 border-green-900 p-4 text-green-400 rounded-lg">
                </div>
                <button onclick="submitToAI()" id="submit-btn" class="w-full bg-green-600 text-black py-5 font-black hover:bg-green-400 rounded-lg text-xl uppercase tracking-tight transition-all">
                    FINISH REPORT
                </button>
            </div>

            <!-- MANUAL AUDIO BACKUP (VISIBLE LINKS) -->
            <div class="mt-12 pt-6 border-t border-green-900/30">
                <p class="text-[10px] text-green-900 font-bold uppercase mb-3 tracking-widest text-center">Audio Troubleshooting (Manual Links)</p>
                <div class="flex justify-center gap-6 text-[10px]">
                    <a href="claim_basic.mp3" target="_blank" class="hover:text-white underline">Basic Audio</a>
                    <a href="claim_intermediate.mp3" target="_blank" class="hover:text-white underline">Intermediate Audio</a>
                    <a href="claim_advanced.mp3" target="_blank" class="hover:text-white underline">Advanced Audio</a>
                </div>
            </div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen" class="hidden mt-8 border-t-4 border-green-900 pt-8 pb-10">
            <h2 class="text-2xl font-black uppercase glow-text mb-6">Case Report Filed</h2>
            <div id="ai-response" class="bg-black p-8 border-2 border-green-600 text-green-400 text-base leading-relaxed whitespace-pre-wrap rounded-xl min-h-[200px]"></div>
            <div class="mt-8 flex gap-4 no-print">
                <button onclick="window.print()" class="bg-green-500 text-black px-8 py-4 font-black hover:bg-green-300 rounded-lg flex-1">PRINT REPORT</button>
                <button onclick="location.reload()" class="border-2 border-green-900 px-8 py-4 font-black hover:bg-green-950 text-green-900 rounded-lg">NEW CASE</button>
            </div>
        </div>

        <footer class="mt-12 pt-4 border-t border-green-950 text-[10px] text-green-900 flex justify-between font-bold uppercase tracking-widest">
            <span>Class 222A Digital Lab</span>
            <span>Harris Adult Education</span>
        </footer>
    </div>

    <script>
        const apiKey = ""; 

        function startClaim() {
            const studentName = document.getElementById('student-name').value;
            const level = document.getElementById('student-level').value;
            if(!studentName) { alert("Please select your name."); return; }
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('claim-screen').classList.remove('hidden');
            document.getElementById('user-display-dummy'); // Just to clear any errors
            
            if(level === 'advanced' || level === 'intermediate') {
                document.getElementById('advanced-fields').classList.remove('hidden');
            }
        }

        function playTargetAudio() {
            const level = document.getElementById('student-level').value;
            const player = document.getElementById('audio-player');
            player.src = "claim_" + level + ".mp3"; // This is the link to your file
            player.play().catch(e => {
                alert("Audio playback failed. Please use the 'Manual Links' at the bottom of the page.");
            });
        }

        function showBackupReport(desc, time, report) {
            const output = `OFFICIAL REPORT\n\nITEM DESCRIPTION:\n${desc}\n\nSTORY:\n${time || "N/A"}\n\nREPORTED SPEECH:\n${report || "N/A"}\n\n--- Status: Filed ---`;
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('ai-response').innerText = output;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerHTML = 'FINISH REPORT';
            document.getElementById('result-screen').scrollIntoView({ behavior: 'smooth' });
        }

        async function submitToAI() {
            const desc = document.getElementById('item-desc').value;
            const time = document.getElementById('time-clause').value;
            const report = document.getElementById('reported-speech').value;
            const btn = document.getElementById('submit-btn');
            if(!desc) { alert("Please type your report."); return; }
            btn.disabled = true;
            btn.innerHTML = 'PROCESSING...';
            setTimeout(() => showBackupReport(desc, time, report), 1200);
        }

        document.getElementById('student-name').addEventListener('change', function() {
            const val = this.value;
            const levelSelect = document.getElementById('student-level');
            const l1_2 = ["B., Adeline", "B., Rose", "F., MacDonald", "S., Frisia", "C., Paola", "H., Maria", "K., Aminata"];
            const l3 = ["C., Vivian", "C., Debora", "C., Domingo", "M., Estefania"];
            const l4_5 = ["E., Marie", "J., Jeyoung", "K., Mijung", "O., Priscilla", "P., Enderson"];
            if (l1_2.includes(val)) levelSelect.value = "basic";
            else if (l3.includes(val)) levelSelect.value = "intermediate";
            else if (l4_5.includes(val)) levelSelect.value = "advanced";
        });
    </script>
</body>
</html>
